apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    containerImage: "quay.io/rhoai/odh-rhel9-operator@sha256:placeholder"
    createdAt: "2024-01-01T00:00:00Z"
    olm.skipRange: ">=1.0.0 <3.4.0"
  name: rhods-operator.3.4.0
spec:
  version: "3.4.0"
  replaces: rhods-operator.3.3.0
  install:
    spec:
      deployments:
      - name: rhods-operator
        spec:
          template:
            spec:
              containers:
              - name: manager
                image: "quay.io/rhoai/odh-rhel9-operator@sha256:placeholder"
                command:
                - /manager
                env:
                - name: DISABLE_DSC_CONFIG
                  value: 'false'
                - name: OPERATOR_NAME
                  value: rhods-operator
                - name: OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
  relatedImages: []
